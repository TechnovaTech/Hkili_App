<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment — Unaï</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(160deg, #00E676, #16a04a 45%, #073620);
        color: #fff; text-align: center; padding: 24px;
      }
      .card {
        background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.25);
        border-radius: 20px; padding: 32px 28px; max-width: 360px;
      }
      .emoji { font-size: 56px; }
      h1 { font-size: 22px; margin: 14px 0 8px; }
      p { opacity: 0.9; line-height: 1.5; margin: 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="emoji" id="emoji">✅</div>
      <h1 id="title">Payment complete</h1>
      <p id="msg">You can close this window and return to the Unaï app — your coins will be added automatically.</p>
    </div>
    <script>
      var status = new URLSearchParams(location.search).get('status');
      if (status === 'cancel') {
        document.getElementById('emoji').textContent = '↩️';
        document.getElementById('title').textContent = 'Payment canceled';
        document.getElementById('msg').textContent = 'No charge was made. You can close this window and return to the Unaï app.';
      }
    </script>
  </body>
</html>
